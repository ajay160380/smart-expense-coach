<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-gradient: linear-gradient(135deg, #4F46E5, #7C3AED);
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-secondary: #4B5563;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* 🚀 GLOBAL NAVBAR */
        .navbar {
            background: var(--card-bg);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-btn {
            background: var(--primary-gradient);
            color: white !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }
        .logout-btn:hover {
            color: #DC2626;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="navbar-brand">💰 SmartCoach</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span style="color: var(--primary); font-weight: 600;">👤 Hi, {{ user.username }}!</span>
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'add_expense' %}" class="nav-btn">+ Add Expense</a>
                
                <form action="{% url 'logout' %}" method="post" style="display:inline; margin:0;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="nav-btn">Register</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
