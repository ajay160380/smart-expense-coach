{% extends 'tracker/base.html' %}
{% block extra_css %}
<style>
/* Override default container constraints for a full immersive experience */
.container { max-width: 100% !important; padding: 0 !important; }
body { overflow-x: hidden; }

.auth-wrapper {
  position: relative;
  min-height: calc(100vh - 75px); /* Subtract navbar height */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: transparent;
  overflow: hidden;
}

/* Vibrant Animated Background Elements */
.ambient-light {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  z-index: 0;
  opacity: 0.6;
  animation: float 12s infinite alternate ease-in-out;
  pointer-events: none;
}
.light-1 {
  top: -10%; left: -5%; width: 50vw; height: 50vw; max-width: 600px; max-height: 600px;
  background: rgba(99, 102, 241, 0.35);
  animation-delay: 0s;
}
.light-2 {
  bottom: -20%; right: -5%; width: 60vw; height: 60vw; max-width: 700px; max-height: 700px;
  background: rgba(168, 85, 247, 0.35);
  animation-delay: -5s;
}
.light-3 {
  top: 30%; left: 40%; width: 40vw; height: 40vw; max-width: 500px; max-height: 500px;
  background: rgba(236, 72, 153, 0.25);
  animation-delay: -2s;
  transform: translateX(-50%);
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 40px) scale(1.1); }
}

/* Premium Glassmorphic Card */
.glass-card {
  position: relative;
  width: 100%;
  max-width: 440px;
  background: var(--card-bg);
  background-color: rgba(var(--card-bg-rgb, 255, 255, 255), 0.7); /* fallback */
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 28px;
  padding: 48px 40px;
  z-index: 1;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
  animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}

[data-theme="dark"] .glass-card {
  background-color: rgba(30, 41, 59, 0.65);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-header {
  text-align: center;
  margin-bottom: 36px;
}
.auth-icon {
  width: 60px;
  height: 60px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 28px rgba(99, 102, 241, 0.4);
  transform: rotate(-6deg);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.glass-card:hover .auth-icon { transform: rotate(0deg) scale(1.08); }
.auth-icon svg { width: 32px; height: 32px; fill: #fff; }

.auth-title { 
  font-size: 1.85rem; 
  font-weight: 800; 
  color: var(--text-main);
  margin-bottom: 8px; 
  letter-spacing: -0.5px;
}
.auth-subtitle { 
  color: var(--text-secondary); 
  font-size: 0.95rem; 
  line-height: 1.5; 
}

/* Modern Form Elements */
.django-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.django-form p {
  margin: 0;
  position: relative;
  animation: fadeIn 0.5s ease both;
}
.django-form p:nth-child(1) { animation-delay: 0.1s; }
.django-form p:nth-child(2) { animation-delay: 0.2s; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.django-form label {
  display: block;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-main);
  margin-bottom: 8px;
}
.django-form input {
  width: 100%;
  padding: 14px 16px;
  background: var(--item-bg);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  color: var(--text-main);
  font-size: 1rem;
  transition: all 0.3s ease;
  box-sizing: border-box;
}
.django-form input:focus {
  outline: none;
  border-color: #a855f7;
  box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
  background: var(--card-bg);
}

.form-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  margin-bottom: 12px;
  font-size: 0.88rem;
}
.remember-me { 
  display: flex; 
  align-items: center; 
  gap: 8px; 
  color: var(--text-secondary); 
  cursor: pointer; 
  font-weight: 500;
}
.remember-me input { 
  accent-color: #a855f7; 
  width: 18px; 
  height: 18px; 
  cursor: pointer; 
}
.forgot-link { 
  color: #a855f7; 
  text-decoration: none; 
  font-weight: 600; 
  transition: color 0.2s; 
}
.forgot-link:hover { color: #9333ea; text-decoration: underline; }

.submit-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
  background-size: 200% auto;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.35);
  position: relative;
  overflow: hidden;
}
.submit-btn:hover {
  background-position: right center;
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(168, 85, 247, 0.45);
}
.submit-btn:active { transform: translateY(0); }

.auth-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 0.95rem;
  color: var(--text-secondary);
}
.auth-footer a { 
  color: #a855f7; 
  font-weight: 700; 
  text-decoration: none; 
  transition: color 0.2s; 
}
.auth-footer a:hover { color: #9333ea; text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <!-- Dynamic Ambient Lights -->
  <div class="ambient-light light-1"></div>
  <div class="ambient-light light-2"></div>
  <div class="ambient-light light-3"></div>

  <div class="glass-card">
    <div class="auth-header">
      <div class="auth-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.93V18h-2v-1.07C9.35 16.56 8 15.3 8 13h2c0 1.1.9 1.5 2 1.5s2-.4 2-1.5c0-.64-.35-1.5-2-1.5-2.1 0-4-1.12-4-3.5C8 6.7 9.35 5.44 11 5.07V4h2v1.07c1.65.37 3 1.63 3 3.93h-2c0-1.1-.9-1.5-2-1.5s-2 .4-2 1.5c0 .9.8 1.5 2 1.5 2.1 0 4 1.12 4 3.5 0 1.8-1.35 3.06-3 3.43z"/></svg>
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Login to continue tracking your expenses beautifully.</p>
    </div>

    <form method="POST" class="django-form">
      {% csrf_token %}
      {{ form.as_p }}
      
      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox"/> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      
      <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
