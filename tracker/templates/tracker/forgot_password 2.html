{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ExpenseTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Nav */
        .auth-nav {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-area img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-highlight {
            color: #60a5fa;
        }

        .nav-right a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            margin-left: 20px;
        }

        .nav-right a:hover {
            color: white;
        }

        /* Container */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .auth-card {
            background: var(--text-main);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-direction: column;
        }

        .auth-content {
            padding: 40px;
            color: #1e293b;
        }

        .auth-header {
            margin-bottom: 24px;
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            color: #0f172a;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .pwd-toggle {
            position: absolute;
            right: 16px;
            top: 36px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .wa-note {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #166534;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
            color: #64748b;
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <nav class="auth-nav">
        <a href="{% url 'landing' %}" class="logo-area">
            <img src="{% static 'tracker/images/icon.png' %}" alt="Logo">
            <div class="logo-text">Expense<span class="logo-highlight">Tracker</span></div>
        </a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-content">
                <div class="auth-header">
                    <h1 class="auth-title">Reset Password</h1>
                    <p class="auth-subtitle">Verify your identity to set a new password.</p>
                </div>
                
                <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

                <!-- STEP 1: Phone / Email -->
                <div id="step1">
                    <div class="form-group">
                        <label class="form-label">Phone Number or Email</label>
                        <input type="text" id="identifier_input" class="form-input" placeholder="Enter your registered number/email" required>
                    </div>
                    <button type="button" class="btn-submit" id="btnSendOtp" onclick="sendOTP()">Send OTP</button>
                    <div class="auth-footer">
                        Remember your password? <a href="{% url 'login' %}">Log in</a>
                    </div>
                </div>
                
                <!-- STEP 2: Verify OTP -->
                <div id="step2" style="display: none;">
                    <div class="wa-note">
                        <p style="font-size:0.9rem; margin:0;">We've sent a 6-digit OTP to your WhatsApp.</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Enter OTP</label>
                        <input type="text" id="otp_input" class="form-input" placeholder="------" maxlength="6" style="text-align:center; font-size: 1.5rem; letter-spacing: 10px;">
                    </div>
                    <button type="button" class="btn-submit" id="btnVerifyOtp" onclick="verifyOTP()">Verify OTP</button>
                    <div style="text-align:center; margin-top:15px;">
                        <a href="javascript:void(0)" onclick="goBackToStep1()" style="color:var(--text-muted); font-size:0.85rem; text-decoration: underline;">Change Phone Number</a>
                    </div>
                </div>
                
                <!-- STEP 3: New Password -->
                <div id="step3" style="display: none;">
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">New Password</label>
                        <input type="password" id="new_password" class="form-input" placeholder="••••••••">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('new_password', this)">👁️</button>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirm_password" class="form-input" placeholder="••••••••">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('confirm_password', this)">👁️</button>
                    </div>
                    <button type="button" class="btn-submit" id="btnResetPassword" onclick="resetPassword()">Update Password</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = '🔒';
            } else {
                input.type = 'password';
                btn.innerText = '👁️';
            }
        }
        
        let currentIdentifier = '';
        let currentOtp = '';
        
        function getCsrfToken() {
            const el = document.querySelector('[name=csrfmiddlewaretoken]');
            return el ? el.value : '';
        }

        async function sendOTP() {
            const identifier = document.getElementById('identifier_input').value.trim();
            if (!identifier) {
                alert('Please enter your phone number or email.');
                return;
            }
            
            const btn = document.getElementById('btnSendOtp');
            const oldText = btn.innerText;
            btn.innerText = 'Sending...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/send-otp/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ identifier: identifier, action: 'reset' })
                });
                const data = await res.json();
                
                if (res.ok) {
                    currentIdentifier = identifier;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('otp_input').focus();
                } else {
                    alert(data.error || 'Failed to send OTP.');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            } finally {
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }
        
        async function verifyOTP() {
            const otp = document.getElementById('otp_input').value.trim();
            if (!otp || otp.length !== 6) {
                alert('Please enter a valid 6-digit OTP.');
                return;
            }
            
            const btn = document.getElementById('btnVerifyOtp');
            const oldText = btn.innerText;
            btn.innerText = 'Verifying...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/verify-otp/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ identifier: currentIdentifier, otp: otp })
                });
                const data = await res.json();
                
                if (res.ok) {
                    currentOtp = otp;
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                    document.getElementById('new_password').focus();
                } else {
                    alert(data.error || 'Invalid OTP.');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            } finally {
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }
        
        async function resetPassword() {
            const p1 = document.getElementById('new_password').value;
            const p2 = document.getElementById('confirm_password').value;
            
            if (!p1 || !p2) {
                alert('Please fill out both password fields.');
                return;
            }
            
            if (p1 !== p2) {
                alert('Passwords do not match.');
                return;
            }
            
            const btn = document.getElementById('btnResetPassword');
            const oldText = btn.innerText;
            btn.innerText = 'Updating...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/reset-password/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify({ identifier: currentIdentifier, otp: currentOtp, new_password: p1 })
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert('Password reset successfully! You can now log in.');
                    window.location.href = "{% url 'login' %}";
                } else {
                    alert(data.error || 'Failed to reset password.');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            } finally {
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }
        
        function goBackToStep1() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }
    </script>
</body>
</html>
